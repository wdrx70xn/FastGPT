name: Build FastGPT images and copy image to docker hub
'on':
  workflow_dispatch: null
  push:
    paths:
    - projects/app/**
    - packages/**
    branches:
    - main
    tags:
    - v*.*.*
jobs:
  build-fastgpt-images:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 1
    - name: Install Dependencies
      run: 'sudo apt update && sudo apt install -y nodejs npm

        '
    - name: Set up QEMU (optional)
      uses: docker/setup-qemu-action@v2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      with:
        driver-opts: network=host
    - name: Cache Docker layers
      uses: actions/cache@v2
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: '${{ runner.os }}-buildx-

          '
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GHP_PAT }}
    - name: Set DOCKER_REPO_TAGGED based on branch or tag
      run: "if [[ \"${{ github.ref_name }}\" == \"main\" ]]; then\n  echo \"DOCKER_REPO_TAGGED=ghcr.io/${{\
        \ github.repository_owner }}/fastgpt:latest\" >> $GITHUB_ENV\nelse\n  echo\
        \ \"DOCKER_REPO_TAGGED=ghcr.io/${{ github.repository_owner }}/fastgpt:${{\
        \ github.ref_name }}\" >> $GITHUB_ENV\nfi\n"
    - name: Build and publish image for main branch or tag push event
      env:
        DOCKER_REPO_TAGGED: ${{ env.DOCKER_REPO_TAGGED }}
      run: 'docker buildx build \

        --build-arg name=app \

        --platform linux/amd64,linux/arm64 \

        --label "org.opencontainers.image.source=https://github.com/${{ github.repository_owner
        }}/FastGPT" \

        --label "org.opencontainers.image.description=fastgpt image" \

        --push \

        --cache-from=type=local,src=/tmp/.buildx-cache \

        --cache-to=type=local,dest=/tmp/.buildx-cache \

        -t ${DOCKER_REPO_TAGGED} \

        -f Dockerfile \

        .

        '
  push-to-docker-hub:
    needs: build-fastgpt-images
    runs-on: ubuntu-latest
    if: github.repository == 'wlc002/FastGPT'
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_NAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}
    - name: Set DOCKER_REPO_TAGGED based on branch or tag
      run: "if [[ \"${{ github.ref_name }}\" == \"main\" ]]; then\n  echo \"IMAGE_TAG=latest\"\
        \ >> $GITHUB_ENV\nelse\n  echo \"IMAGE_TAG=${{ github.ref_name }}\" >> $GITHUB_ENV\n\
        fi\n"
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GHP_PAT }}
    - name: Pull image from GitHub Container Registry
      run: docker pull ghcr.io/${{ github.repository_owner }}/fastgpt:${{env.IMAGE_TAG}}
    - name: Tag image with Docker Hub repository name and version tag
      run: docker tag ghcr.io/${{ github.repository_owner }}/fastgpt:${{env.IMAGE_TAG}}
        ${{ secrets.DOCKER_IMAGE_NAME }}:${{env.IMAGE_TAG}}
    - name: Push image to Docker Hub
      run: docker push ${{ secrets.DOCKER_IMAGE_NAME }}:${{env.IMAGE_TAG}}
